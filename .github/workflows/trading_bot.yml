name: Agente Polymarket Autónomo

on:
  schedule:
    - cron: '*/30 * * * *' # Corre solo cada 30 min para cuidar la API gratis
  workflow_dispatch:      # Botón de "Play" manual

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Descargando Código
        uses: actions/checkout@v4

      - name: Configurando Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalando Librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas groq python-dotenv web3

      - name: Ejecutando Agente
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py