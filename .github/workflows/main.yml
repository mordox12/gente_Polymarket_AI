name: Agente IA Polymarket Ejecutivo

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'  # Ejecución programada cada hora exacta
  workflow_dispatch:     # Permite ejecución manual para demostraciones

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del Repo
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerías Profesionales
        run: pip install requests python-dotenv feedparser

      - name: Correr el Agente de Inteligencia
        env:
          # Asegúrate de que estos nombres coincidan con tus Secrets en GitHub
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py