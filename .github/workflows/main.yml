name: Agente IA Polymarket Ejecutivo

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del Repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar Librerías Profesionales
        run: pip install requests python-dotenv feedparser

      - name: Correr el Agente de Inteligencia
        env:
          # ESTO ES LO QUE ESTABA FALLANDO:
          TOKEN_DE_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ID_DE_CHAT_DE_TELEGRAM: ${{ secrets.ID_DE_CHAT_DE_TELEGRAM }}
        run: python main.py