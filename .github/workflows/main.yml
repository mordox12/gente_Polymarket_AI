name: Agente IA Polymarket Ejecutor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *' # Esto hace que el bot corra solo cada 30 minutos

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del Repo
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerías Necesarias
        run: pip install requests python-dotenv

      - name: Correr el Agente IA
        env:
          # Estas variables las saca GitHub de tu "Caja Fuerte" (Secrets)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
        run: python main.py