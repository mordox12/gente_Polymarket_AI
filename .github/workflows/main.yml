name: Agente IA Polymarket Ejecutor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/10 * * * *'  # <-- CAMBIADO A 10 MINUTOS
  workflow_dispatch:        # Para que puedas darle "Run" manual si quieres

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del Repo
        uses: actions/checkout@v3

      - name: Configurar Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Librerías Necesarias
        run: pip install requests python-dotenv

      - name: Correr el Agente IA
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py